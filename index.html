<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeList</title>
<style>
  :root {
    --green: #2D6A4F;
    --green-dark: #1B4332;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-500: #6B7280;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-900: #111827;
    --amber-bg: #FFFBEB;
    --amber-text: #92400E;
    --amber-border: #FCD34D;
    --red-bg: #FEF2F2;
    --red-text: #991B1B;
    --red-border: #FCA5A5;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: white;
    border-bottom: 1px solid var(--gray-200);
    padding: 1rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-inner {
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    font-family: Georgia, serif;
    font-size: 24px;
    font-weight: normal;
    letter-spacing: -0.5px;
  }
  .brand em { font-style: normal; color: var(--green); }
  .header-stats { font-size: 13px; color: var(--gray-400); }

  /* ── Layout ── */
  main { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* ── Form ── */
  .form-card {
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .form-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--gray-500);
    margin-bottom: 1rem;
  }
  .field { margin-bottom: .7rem; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-600);
    margin-bottom: 3px;
  }
  .field input,
  .field textarea,
  .field select {
    width: 100%;
    padding: 8px 11px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    color: var(--gray-900);
    background: white;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus,
  .field textarea:focus,
  .field select:focus {
    border-color: #6EE7B7;
    box-shadow: 0 0 0 3px rgba(45,106,79,.08);
  }
  .field textarea { resize: vertical; min-height: 65px; line-height: 1.5; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-add {
    width: 100%;
    padding: 10px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-top: 6px;
    transition: background .15s, transform .1s;
  }
  .btn-add:hover { background: var(--green-dark); }
  .btn-add:active { transform: scale(.98); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filters { display: flex; gap: 5px; flex-wrap: wrap; }
  .chip {
    padding: 5px 13px;
    border-radius: 20px;
    font-size: 13px;
    font-family: inherit;
    border: 1px solid var(--gray-200);
    background: white;
    color: var(--gray-600);
    cursor: pointer;
    transition: all .12s;
  }
  .chip:hover { border-color: var(--gray-400); }
  .chip.active { background: var(--green); border-color: var(--green); color: white; }
  .sort-wrap { display: flex; align-items: center; gap: 6px; }
  .sort-wrap label { font-size: 12px; color: var(--gray-500); white-space: nowrap; }
  .sort-wrap select {
    padding: 4px 8px;
    font-size: 12px;
    font-family: inherit;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    background: white;
    color: var(--gray-700);
    outline: none;
    cursor: pointer;
  }

  /* ── Section labels ── */
  .sec-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--gray-400);
    margin: 1.25rem 0 .5rem;
  }

  /* ── Task cards ── */
  .task-card {
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: .9rem 1rem;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 8px;
    transition: opacity .2s, box-shadow .15s;
  }
  .task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .task-card.done { opacity: .45; }
  .task-card.overdue { border-left: 3px solid var(--red-border); }
  .task-card.due-today { border-left: 3px solid var(--amber-border); }

  .chk-wrap { flex-shrink: 0; padding-top: 2px; }
  .chk-wrap input[type=checkbox] {
    width: 17px; height: 17px;
    cursor: pointer;
    accent-color: var(--green);
  }

  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--gray-900);
    line-height: 1.4;
    margin-bottom: 2px;
  }
  .task-card.done .task-title { text-decoration: line-through; color: var(--gray-400); }
  .task-note {
    font-size: 13px;
    color: var(--gray-500);
    line-height: 1.5;
    margin-bottom: 7px;
    white-space: pre-wrap;
  }
  .task-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  /* ── Tags ── */
  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .tag-date    { background: var(--gray-100); color: var(--gray-600); }
  .tag-today   { background: var(--amber-bg); color: var(--amber-text); border: 1px solid var(--amber-border); }
  .tag-overdue { background: var(--red-bg); color: var(--red-text); border: 1px solid var(--red-border); }
  .tag-cat     { background: #ECFDF5; color: #065F46; }
  .tag-high    { background: #FFF7ED; color: #9A3412; border: 1px solid #FDBA74; }

  /* ── Delete button ── */
  .del-btn {
    flex-shrink: 0;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: none;
    color: var(--gray-400);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    transition: background .12s, color .12s;
  }
  .del-btn:hover { background: var(--red-bg); color: var(--red-text); }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 3.5rem 0;
    color: var(--gray-400);
    font-size: 14px;
  }
  .empty p { margin-top: .4rem; font-size: 13px; color: var(--gray-400); }

  footer {
    text-align: center;
    font-size: 12px;
    color: var(--gray-400);
    padding: 2rem 0 1rem;
  }

  @media (max-width: 480px) {
    .row2 { grid-template-columns: 1fr; }
    .toolbar { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="brand">Life<em>List</em></span>
    <span class="header-stats" id="stats">0 tasks remaining</span>
  </div>
</header>

<main>

  <div class="form-card">
    <div class="form-title">Add a task</div>
    <div class="field">
      <label>Task</label>
      <input type="text" id="f-title" placeholder="What do you need to do?" autocomplete="off">
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="f-note" placeholder="Any details or reminders..."></textarea>
    </div>
    <div class="row2">
      <div class="field">
        <label>Due date</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label>Time</label>
        <input type="time" id="f-time">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Category</label>
        <select id="f-cat">
          <option value="">No category</option>
          <option>Errand</option>
          <option>Home</option>
          <option>Health</option>
          <option>Social</option>
          <option>Finance</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Priority</label>
        <select id="f-pri">
          <option value="normal">Normal</option>
          <option value="high">High</option>
        </select>
      </div>
    </div>
    <button class="btn-add" onclick="addTask()">+ Add task</button>
  </div>

  <div class="toolbar">
    <div class="filters">
      <button class="chip active" onclick="setFilter('all', this)">All</button>
      <button class="chip" onclick="setFilter('today', this)">Today</button>
      <button class="chip" onclick="setFilter('upcoming', this)">Upcoming</button>
      <button class="chip" onclick="setFilter('done', this)">Done</button>
    </div>
    <div class="sort-wrap">
      <label for="sort-sel">Sort by</label>
      <select id="sort-sel" onchange="render()">
        <option value="added">Date added</option>
        <option value="due">Due date</option>
        <option value="priority">Priority</option>
      </select>
    </div>
  </div>

  <div id="list"></div>

</main>

<footer>LifeList &mdash; your personal to-do list</footer>

<script>
  let tasks = [];
  let filter = 'all';

  function load() {
    try {
      const s = localStorage.getItem('lifelist');
      if (s) tasks = JSON.parse(s);
    } catch(e) { tasks = []; }
    render();
  }

  function save() {
    try { localStorage.setItem('lifelist', JSON.stringify(tasks)); } catch(e) {}
  }

  function addTask() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }
    tasks.unshift({
      id:    Date.now(),
      title,
      note:  document.getElementById('f-note').value.trim(),
      date:  document.getElementById('f-date').value,
      time:  document.getElementById('f-time').value,
      cat:   document.getElementById('f-cat').value,
      pri:   document.getElementById('f-pri').value,
      done:  false,
      added: Date.now()
    });
    ['f-title','f-note','f-date','f-time'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-cat').value = '';
    document.getElementById('f-pri').value = 'normal';
    save(); render();
    document.getElementById('f-title').focus();
  }

  function toggle(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function remove(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function setFilter(f, el) {
    filter = f;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  function fmtDate(t) {
    if (!t.date) return null;
    const [y, m, d] = t.date.split('-');
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let s = mo[+m - 1] + ' ' + +d + ', ' + y;
    if (t.time) {
      let [hh, mm] = t.time.split(':').map(Number);
      const ap = hh >= 12 ? 'pm' : 'am';
      if (hh > 12) hh -= 12;
      if (hh === 0) hh = 12;
      s += ' · ' + hh + ':' + String(mm).padStart(2, '0') + ' ' + ap;
    }
    return s;
  }

  function getVisible() {
    const today = todayStr();
    if (filter === 'today')    return tasks.filter(t => !t.done && t.date === today);
    if (filter === 'upcoming') return tasks.filter(t => !t.done && t.date && t.date > today);
    if (filter === 'done')     return tasks.filter(t => t.done);
    return [...tasks];
  }

  function getSorted(list) {
    const sort = document.getElementById('sort-sel').value;
    if (sort === 'due') {
      return [...list].sort((a, b) => {
        if (!a.date && !b.date) return 0;
        if (!a.date) return 1;
        if (!b.date) return -1;
        return (a.date + (a.time||'00:00')).localeCompare(b.date + (b.time||'00:00'));
      });
    }
    if (sort === 'priority') {
      return [...list].sort((a, b) => a.pri === b.pri ? 0 : a.pri === 'high' ? -1 : 1);
    }
    return list;
  }

  function render() {
    const today = todayStr();
    const remaining = tasks.filter(t => !t.done).length;
    document.getElementById('stats').textContent =
      remaining + ' task' + (remaining === 1 ? '' : 's') + ' remaining';

    const visible = getSorted(getVisible());
    const listEl  = document.getElementById('list');

    if (!visible.length) {
      const msgs = {
        all:      ['Nothing here yet',       'Add your first task above.'],
        today:    ['Nothing due today',       'Enjoy your day!'],
        upcoming: ['Nothing upcoming',        "You're all caught up."],
        done:     ['No completed tasks yet',  'Check something off your list.']
      };
      const [h, p] = msgs[filter] || msgs.all;
      listEl.innerHTML = `<div class="empty"><strong>${h}</strong><p>${p}</p></div>`;
      return;
    }

    const high   = visible.filter(t => !t.done && t.pri === 'high');
    const normal = visible.filter(t => !t.done && t.pri !== 'high');
    const done   = visible.filter(t => t.done);

    let html = '';
    if (high.length)   { html += '<div class="sec-label">High priority</div>' + high.map(card).join(''); }
    if (normal.length) { if (high.length) html += '<div class="sec-label">Tasks</div>'; html += normal.map(card).join(''); }
    if (done.length)   { html += '<div class="sec-label">Completed</div>' + done.map(card).join(''); }
    listEl.innerHTML = html;
  }

  function card(t) {
    const today    = todayStr();
    const isOver   = t.date && !t.done && t.date < today;
    const isToday  = t.date === today && !t.done;
    const ds       = fmtDate(t);

    let dateTag = '';
    if (ds) {
      if (isOver)       dateTag = `<span class="tag tag-overdue">Overdue &middot; ${esc(ds)}</span>`;
      else if (isToday) dateTag = `<span class="tag tag-today">${esc(ds)}</span>`;
      else              dateTag = `<span class="tag tag-date">${esc(ds)}</span>`;
    }

    const catTag = t.cat           ? `<span class="tag tag-cat">${esc(t.cat)}</span>` : '';
    const priTag = t.pri === 'high' && !t.done ? `<span class="tag tag-high">High priority</span>` : '';

    const cls = ['task-card',
      t.done    ? 'done'      : '',
      isOver    ? 'overdue'   : '',
      isToday   ? 'due-today' : ''
    ].filter(Boolean).join(' ');

    return `
    <div class="${cls}">
      <div class="chk-wrap">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
      </div>
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ''}
        <div class="task-meta">${dateTag}${catTag}${priTag}</div>
      </div>
      <button class="del-btn" onclick="remove(${t.id})" title="Delete">&#x2715;</button>
    </div>`;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('f-title').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  load();
</script>
</body>
</html>
