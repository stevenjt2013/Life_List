<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LifeList</title>
<style>
  :root {
    --green: #2D6A4F;
    --green-dark: #1B4332;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-500: #6B7280;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-900: #111827;
    --amber-bg: #FFFBEB;
    --amber-text: #92400E;
    --amber-border: #FCD34D;
    --red-bg: #FEF2F2;
    --red-text: #991B1B;
    --red-border: #FCA5A5;
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    min-height: 100vh;
  }

  /* ── Login screen ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }
  .login-brand {
    font-family: Georgia, serif;
    font-size: 42px;
    font-weight: normal;
    letter-spacing: -1px;
    margin-bottom: .5rem;
  }
  .login-brand em { font-style: normal; color: var(--green); }
  .login-sub {
    font-size: 15px;
    color: var(--gray-500);
    margin-bottom: 2.5rem;
  }
  .btn-google {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    font-size: 15px;
    font-family: inherit;
    color: var(--gray-700);
    cursor: pointer;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    transition: box-shadow .15s, transform .1s;
  }
  .btn-google:hover { box-shadow: 0 3px 8px rgba(0,0,0,.12); }
  .btn-google:active { transform: scale(.98); }
  .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }
  .login-note { font-size: 12px; color: var(--gray-400); margin-top: 1rem; }

  /* ── App (hidden until logged in) ── */
  #app { display: none; }

  /* ── Header ── */
  header {
    background: white;
    border-bottom: 1px solid var(--gray-200);
    padding: 1rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-inner {
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .brand {
    font-family: Georgia, serif;
    font-size: 24px;
    font-weight: normal;
    letter-spacing: -0.5px;
  }
  .brand em { font-style: normal; color: var(--green); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-stats { font-size: 13px; color: var(--gray-400); }
  .user-info { display: flex; align-items: center; gap: 8px; }
  .user-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    object-fit: cover;
  }
  .btn-signout {
    font-size: 12px;
    color: var(--gray-500);
    background: none;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    padding: 3px 9px;
    cursor: pointer;
    font-family: inherit;
    transition: background .12s;
  }
  .btn-signout:hover { background: var(--gray-100); }

  /* ── Layout ── */
  main { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* ── Form ── */
  .form-card {
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .form-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--gray-500);
    margin-bottom: 1rem;
  }
  .field { margin-bottom: .7rem; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-600);
    margin-bottom: 3px;
  }
  .field input,
  .field textarea,
  .field select {
    width: 100%;
    padding: 8px 11px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    color: var(--gray-900);
    background: white;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus,
  .field textarea:focus,
  .field select:focus {
    border-color: #6EE7B7;
    box-shadow: 0 0 0 3px rgba(45,106,79,.08);
  }
  .field textarea { resize: vertical; min-height: 65px; line-height: 1.5; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-add {
    width: 100%;
    padding: 10px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-top: 6px;
    transition: background .15s, transform .1s;
  }
  .btn-add:hover { background: var(--green-dark); }
  .btn-add:active { transform: scale(.98); }
  .btn-add:disabled { opacity: .6; cursor: not-allowed; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filters { display: flex; gap: 5px; flex-wrap: wrap; }
  .chip {
    padding: 5px 13px;
    border-radius: 20px;
    font-size: 13px;
    font-family: inherit;
    border: 1px solid var(--gray-200);
    background: white;
    color: var(--gray-600);
    cursor: pointer;
    transition: all .12s;
  }
  .chip:hover { border-color: var(--gray-400); }
  .chip.active { background: var(--green); border-color: var(--green); color: white; }
  .sort-wrap { display: flex; align-items: center; gap: 6px; }
  .sort-wrap label { font-size: 12px; color: var(--gray-500); white-space: nowrap; }
  .sort-wrap select {
    padding: 4px 8px;
    font-size: 12px;
    font-family: inherit;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    background: white;
    color: var(--gray-700);
    outline: none;
    cursor: pointer;
  }

  /* ── Section labels ── */
  .sec-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--gray-400);
    margin: 1.25rem 0 .5rem;
  }

  /* ── Task cards ── */
  .task-card {
    background: white;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: .9rem 1rem;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 8px;
    transition: opacity .2s, box-shadow .15s;
  }
  .task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .task-card.done { opacity: .45; }
  .task-card.overdue { border-left: 3px solid var(--red-border); }
  .task-card.due-today { border-left: 3px solid var(--amber-border); }

  .chk-wrap { flex-shrink: 0; padding-top: 2px; }
  .chk-wrap input[type=checkbox] {
    width: 17px; height: 17px;
    cursor: pointer;
    accent-color: var(--green);
  }
  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--gray-900);
    line-height: 1.4;
    margin-bottom: 2px;
  }
  .task-card.done .task-title { text-decoration: line-through; color: var(--gray-400); }
  .task-note {
    font-size: 13px;
    color: var(--gray-500);
    line-height: 1.5;
    margin-bottom: 7px;
    white-space: pre-wrap;
  }
  .task-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  /* ── Tags ── */
  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .tag-date    { background: var(--gray-100); color: var(--gray-600); }
  .tag-today   { background: var(--amber-bg); color: var(--amber-text); border: 1px solid var(--amber-border); }
  .tag-overdue { background: var(--red-bg); color: var(--red-text); border: 1px solid var(--red-border); }
  .tag-cat     { background: #ECFDF5; color: #065F46; }
  .tag-high    { background: #FFF7ED; color: #9A3412; border: 1px solid #FDBA74; }

  /* ── Delete button ── */
  .del-btn {
    flex-shrink: 0;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    border: none;
    color: var(--gray-400);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    transition: background .12s, color .12s;
  }
  .del-btn:hover { background: var(--red-bg); color: var(--red-text); }

  /* ── Loading / Empty ── */
  .loading {
    text-align: center;
    padding: 3rem 0;
    color: var(--gray-400);
    font-size: 14px;
  }
  .empty {
    text-align: center;
    padding: 3.5rem 0;
    color: var(--gray-400);
    font-size: 14px;
  }
  .empty p { margin-top: .4rem; font-size: 13px; }

  footer {
    text-align: center;
    font-size: 12px;
    color: var(--gray-400);
    padding: 2rem 0 1rem;
  }

  @media (max-width: 480px) {
    .row2 { grid-template-columns: 1fr; }
    .toolbar { flex-direction: column; align-items: flex-start; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-brand">Life<em>List</em></div>
  <p class="login-sub">Your personal to-do list — synced across all your devices</p>
  <button class="btn-google" onclick="signIn()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </button>
  <p class="login-note">Only you can see your tasks</p>
</div>

<!-- Main App -->
<div id="app">
  <header>
    <div class="header-inner">
      <span class="brand">Life<em>List</em></span>
      <div class="header-right">
        <span class="header-stats" id="stats">0 tasks remaining</span>
        <div class="user-info">
          <img class="user-avatar" id="user-avatar" src="" alt="" style="display:none">
          <button class="btn-signout" onclick="signOut()">Sign out</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="form-card">
      <div class="form-title">Add a task</div>
      <div class="field">
        <label>Task</label>
        <input type="text" id="f-title" placeholder="What do you need to do?" autocomplete="off">
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="f-note" placeholder="Any details or reminders..."></textarea>
      </div>
      <div class="row2">
        <div class="field">
          <label>Due date</label>
          <input type="date" id="f-date">
        </div>
        <div class="field">
          <label>Time</label>
          <input type="time" id="f-time">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Category</label>
          <select id="f-cat">
            <option value="">No category</option>
            <option>Errand</option>
            <option>Home</option>
            <option>Health</option>
            <option>Social</option>
            <option>Finance</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Priority</label>
          <select id="f-pri">
            <option value="normal">Normal</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>
      <button class="btn-add" id="add-btn" onclick="addTask()">+ Add task</button>
    </div>

    <div class="toolbar">
      <div class="filters">
        <button class="chip active" onclick="setFilter('all', this)">All</button>
        <button class="chip" onclick="setFilter('today', this)">Today</button>
        <button class="chip" onclick="setFilter('upcoming', this)">Upcoming</button>
        <button class="chip" onclick="setFilter('done', this)">Done</button>
      </div>
      <div class="sort-wrap">
        <label for="sort-sel">Sort by</label>
        <select id="sort-sel" onchange="render()">
          <option value="added">Date added</option>
          <option value="due">Due date</option>
          <option value="priority">Priority</option>
        </select>
      </div>
    </div>

    <div id="list"><div class="loading">Loading your tasks...</div></div>
  </main>

  <footer>LifeList &mdash; your personal to-do list</footer>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, where, onSnapshot, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCybRO_oqOzKHwB94fVL3I485CLBu9EMjw",
    authDomain: "lifelist-1938c.firebaseapp.com",
    projectId: "lifelist-1938c",
    storageBucket: "lifelist-1938c.firebasestorage.app",
    messagingSenderId: "834084521886",
    appId: "1:834084521886:web:5ffd82684228703b0d788f"
  };

  const fbApp  = initializeApp(firebaseConfig);
  const auth   = getAuth(fbApp);
  const db     = getFirestore(fbApp);
  const provider = new GoogleAuthProvider();

  let tasks = [];
  let filter = 'all';
  let currentUser = null;
  let unsubscribe = null;

  // ── Auth ──────────────────────────────────────────────────
  window.signIn = async () => {
    try { await signInWithPopup(auth, provider); }
    catch(e) { console.error(e); alert('Sign-in failed. Please try again.'); }
  };

  window.signOut = async () => {
    if (unsubscribe) unsubscribe();
    await fbSignOut(auth);
  };

  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      const av = document.getElementById('user-avatar');
      if (user.photoURL) { av.src = user.photoURL; av.style.display = 'block'; }
      subscribeToTasks(user.uid);
    } else {
      currentUser = null;
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
      tasks = [];
    }
  });

  // ── Firestore sync ────────────────────────────────────────
  function subscribeToTasks(uid) {
    if (unsubscribe) unsubscribe();
    const q = query(collection(db, 'tasks'), where('uid', '==', uid));
    unsubscribe = onSnapshot(q, snap => {
      tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.added?.seconds || 0) - (a.added?.seconds || 0));
      render();
    });
  }

  // ── Add task ──────────────────────────────────────────────
  window.addTask = async () => {
    const title = document.getElementById('f-title').value.trim();
    if (!title || !currentUser) return;

    const btn = document.getElementById('add-btn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      await addDoc(collection(db, 'tasks'), {
        uid:   currentUser.uid,
        title,
        note:  document.getElementById('f-note').value.trim(),
        date:  document.getElementById('f-date').value,
        time:  document.getElementById('f-time').value,
        cat:   document.getElementById('f-cat').value,
        pri:   document.getElementById('f-pri').value,
        done:  false,
        added: serverTimestamp()
      });
      ['f-title','f-note','f-date','f-time'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-cat').value = '';
      document.getElementById('f-pri').value = 'normal';
      document.getElementById('f-title').focus();
    } catch(e) {
      console.error(e);
      alert('Could not save task. Check your connection.');
    }

    btn.disabled = false;
    btn.textContent = '+ Add task';
  };

  // ── Toggle done ───────────────────────────────────────────
  window.toggle = async (id, done) => {
    try { await updateDoc(doc(db, 'tasks', id), { done: !done }); }
    catch(e) { console.error(e); }
  };

  // ── Delete ────────────────────────────────────────────────
  window.remove = async (id) => {
    try { await deleteDoc(doc(db, 'tasks', id)); }
    catch(e) { console.error(e); }
  };

  // ── Filter / Sort ─────────────────────────────────────────
  window.setFilter = (f, el) => {
    filter = f;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    render();
  };

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  function fmtDate(t) {
    if (!t.date) return null;
    const [y, m, d] = t.date.split('-');
    const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let s = mo[+m - 1] + ' ' + +d + ', ' + y;
    if (t.time) {
      let [hh, mm] = t.time.split(':').map(Number);
      const ap = hh >= 12 ? 'pm' : 'am';
      if (hh > 12) hh -= 12;
      if (hh === 0) hh = 12;
      s += ' · ' + hh + ':' + String(mm).padStart(2, '0') + ' ' + ap;
    }
    return s;
  }

  function getVisible() {
    const today = todayStr();
    if (filter === 'today')    return tasks.filter(t => !t.done && t.date === today);
    if (filter === 'upcoming') return tasks.filter(t => !t.done && t.date && t.date > today);
    if (filter === 'done')     return tasks.filter(t => t.done);
    return [...tasks];
  }

  function getSorted(list) {
    const sort = document.getElementById('sort-sel').value;
    if (sort === 'due') {
      return [...list].sort((a, b) => {
        if (!a.date && !b.date) return 0;
        if (!a.date) return 1;
        if (!b.date) return -1;
        return (a.date + (a.time||'00:00')).localeCompare(b.date + (b.time||'00:00'));
      });
    }
    if (sort === 'priority') {
      return [...list].sort((a, b) => a.pri === b.pri ? 0 : a.pri === 'high' ? -1 : 1);
    }
    return list;
  }

  // ── Render ────────────────────────────────────────────────
  window.render = () => {
    const today = todayStr();
    const remaining = tasks.filter(t => !t.done).length;
    document.getElementById('stats').textContent =
      remaining + ' task' + (remaining === 1 ? '' : 's') + ' remaining';

    const visible = getSorted(getVisible());
    const listEl  = document.getElementById('list');

    if (!visible.length) {
      const msgs = {
        all:      ['Nothing here yet',      'Add your first task above.'],
        today:    ['Nothing due today',      'Enjoy your day!'],
        upcoming: ['Nothing upcoming',       "You're all caught up."],
        done:     ['No completed tasks yet', 'Check something off your list.']
      };
      const [h, p] = msgs[filter] || msgs.all;
      listEl.innerHTML = `<div class="empty"><strong>${h}</strong><p>${p}</p></div>`;
      return;
    }

    const high   = visible.filter(t => !t.done && t.pri === 'high');
    const normal = visible.filter(t => !t.done && t.pri !== 'high');
    const done   = visible.filter(t => t.done);

    let html = '';
    if (high.length)   { html += '<div class="sec-label">High priority</div>' + high.map(card).join(''); }
    if (normal.length) { if (high.length) html += '<div class="sec-label">Tasks</div>'; html += normal.map(card).join(''); }
    if (done.length)   { html += '<div class="sec-label">Completed</div>' + done.map(card).join(''); }
    listEl.innerHTML = html;
  };

  function card(t) {
    const today   = todayStr();
    const isOver  = t.date && !t.done && t.date < today;
    const isToday = t.date === today && !t.done;
    const ds      = fmtDate(t);

    let dateTag = '';
    if (ds) {
      if (isOver)       dateTag = `<span class="tag tag-overdue">Overdue &middot; ${esc(ds)}</span>`;
      else if (isToday) dateTag = `<span class="tag tag-today">${esc(ds)}</span>`;
      else              dateTag = `<span class="tag tag-date">${esc(ds)}</span>`;
    }
    const catTag = t.cat ? `<span class="tag tag-cat">${esc(t.cat)}</span>` : '';
    const priTag = t.pri === 'high' && !t.done ? `<span class="tag tag-high">High priority</span>` : '';

    const cls = ['task-card',
      t.done   ? 'done'      : '',
      isOver   ? 'overdue'   : '',
      isToday  ? 'due-today' : ''
    ].filter(Boolean).join(' ');

    return `
    <div class="${cls}">
      <div class="chk-wrap">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle('${t.id}', ${t.done})">
      </div>
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ''}
        <div class="task-meta">${dateTag}${catTag}${priTag}</div>
      </div>
      <button class="del-btn" onclick="remove('${t.id}')" title="Delete">&#x2715;</button>
    </div>`;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('f-title').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });
</script>
</body>
</html>
